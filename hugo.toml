baseURL = "https://tedlango.com"
languageCode = "en-us"
title = "Ted Lango"

[params]
  author = "Ted Lango"
  description = "Workforce Transformation & Applied Intelligence — essays, photography, technology, and experiments"
  apiBase = "https://living-resume-api.tedlango.workers.dev"
  agentBase = "https://resume-agent.tedlango.workers.dev"
  ga4 = "G-HQRSND342K"
  ogImage = "img/og-default.png"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    noClasses = true

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "monthly"
  priority = 0.5

[frontmatter]
  lastmod = [":git", "lastmod", "date"]

enableRobotsTXT = true
ignoreLogs = ['warning-frontmatter-params-overrides']

[permalinks]
  essays = "/essays/:slug/"
  tech = "/tech/:slug/"

[[menus.main]]
  name = "Home"
  url = "/"
  weight = 1


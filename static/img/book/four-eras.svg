<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <rect width="800" height="360" rx="8" fill="#0d1b2a"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#f5c542" font-size="18" font-weight="600">Four Eras of WFM</text>
  <text x="400" y="70" text-anchor="middle" fill="#8899aa" font-size="13">Each improved tooling &#8212; yet determinism dominated</text>

  <!-- Timeline line -->
  <line x1="80" y1="195" x2="720" y2="195" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Era 1 -->
  <circle cx="160" cy="195" r="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <line x1="160" y1="175" x2="160" y2="187" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="100" y="95" width="120" height="80" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="160" y="120" text-anchor="middle" fill="#e5e5e5" font-size="15" font-weight="600">Era 1</text>
  <text x="160" y="140" text-anchor="middle" fill="#8899aa" font-size="11">Paper &amp; Phones</text>
  <text x="160" y="158" text-anchor="middle" fill="#556677" font-size="10">1960s &#8211; 1985</text>

  <!-- Era 2 -->
  <circle cx="320" cy="195" r="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <line x1="320" y1="175" x2="320" y2="187" stroke="#2a4a7f" stroke-width="1"/>
  <rect x="260" y="95" width="120" height="80" rx="6" fill="#111827" stroke="#2a4a7f" stroke-width="1"/>
  <text x="320" y="120" text-anchor="middle" fill="#e5e5e5" font-size="15" font-weight="600">Era 2</text>
  <text x="320" y="140" text-anchor="middle" fill="#8899aa" font-size="11">Desktop WFM</text>
  <text x="320" y="158" text-anchor="middle" fill="#556677" font-size="10">1985 &#8211; 2005</text>

  <!-- Era 3 -->
  <circle cx="480" cy="195" r="8" fill="#2a4a7f" stroke="#3b82f6" stroke-width="2"/>
  <line x1="480" y1="175" x2="480" y2="187" stroke="#3b6abf" stroke-width="1"/>
  <rect x="420" y="95" width="120" height="80" rx="6" fill="#111827" stroke="#3b6abf" stroke-width="1"/>
  <text x="480" y="120" text-anchor="middle" fill="#e5e5e5" font-size="15" font-weight="600">Era 3</text>
  <text x="480" y="140" text-anchor="middle" fill="#8899aa" font-size="11">Cloud &amp; Analytics</text>
  <text x="480" y="158" text-anchor="middle" fill="#556677" font-size="10">2005 &#8211; 2020</text>

  <!-- Era 4 (highlighted) -->
  <circle cx="640" cy="195" r="8" fill="#3b82f6" stroke="#f5c542" stroke-width="2"/>
  <line x1="640" y1="175" x2="640" y2="187" stroke="#f5c542" stroke-width="1"/>
  <rect x="580" y="95" width="120" height="80" rx="6" fill="#111827" stroke="#f5c542" stroke-width="1.5"/>
  <text x="640" y="120" text-anchor="middle" fill="#f5c542" font-size="15" font-weight="600">Era 4</text>
  <text x="640" y="140" text-anchor="middle" fill="#8899aa" font-size="11">AI + Human</text>
  <text x="640" y="158" text-anchor="middle" fill="#556677" font-size="10">2020 &#8211; Now</text>

  <!-- Arrow indicators between eras -->
  <text x="240" y="200" text-anchor="middle" fill="#334455" font-size="16">&#8594;</text>
  <text x="400" y="200" text-anchor="middle" fill="#334455" font-size="16">&#8594;</text>
  <text x="560" y="200" text-anchor="middle" fill="#445566" font-size="16">&#8594;</text>

  <!-- Bottom insight -->
  <rect x="100" y="240" width="600" height="40" rx="6" fill="#111827" stroke="#334455" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="265" text-anchor="middle" fill="#8899aa" font-size="12">Better tools, same deterministic thinking</text>

  <!-- Lesson -->
  <text x="400" y="330" text-anchor="middle" fill="#f5c542" font-size="13" font-style="italic">Prediction-dependent systems have a ceiling &#8212; and we've hit it</text>
</svg>

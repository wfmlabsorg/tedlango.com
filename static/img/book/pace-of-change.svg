<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5c542"/>
      <stop offset="100%" stop-color="#f59e42"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#f5c542" font-size="22" font-weight="600" font-style="italic">Pace of Change</text>
  <text x="400" y="70" text-anchor="middle" fill="#8899aa" font-size="13">Each era arrives faster than the last</text>

  <!-- Timeline base line -->
  <line x1="60" y1="340" x2="740" y2="340" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Era bars (height represents duration, logarithmic visual scale) -->
  <!-- Stone Age: millennia → tallest -->
  <rect x="80" y="100" width="100" height="240" rx="4" fill="url(#barGrad)" opacity="0.3"/>
  <rect x="80" y="100" width="100" height="240" rx="4" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <text x="130" y="135" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="600">Stone Age</text>
  <text x="130" y="155" text-anchor="middle" fill="#8899aa" font-size="10">10,000+ BC</text>
  <text x="130" y="310" text-anchor="middle" fill="#f5c542" font-size="14" font-weight="600">Millennia</text>

  <!-- Bronze/Iron: 4000 years -->
  <rect x="210" y="155" width="100" height="185" rx="4" fill="url(#barGrad)" opacity="0.4"/>
  <rect x="210" y="155" width="100" height="185" rx="4" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <text x="260" y="185" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="600">Bronze/Iron</text>
  <text x="260" y="205" text-anchor="middle" fill="#8899aa" font-size="10">3500 BC – 500 AD</text>
  <text x="260" y="310" text-anchor="middle" fill="#f5c542" font-size="14" font-weight="600">4,000 yrs</text>

  <!-- Industrial: 200 years -->
  <rect x="340" y="250" width="100" height="90" rx="4" fill="url(#barGrad)" opacity="0.55"/>
  <rect x="340" y="250" width="100" height="90" rx="4" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
  <text x="390" y="272" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="600">Industrial</text>
  <text x="390" y="290" text-anchor="middle" fill="#8899aa" font-size="10">1750 – 1950</text>
  <text x="390" y="310" text-anchor="middle" fill="#f5c542" font-size="14" font-weight="600">200 yrs</text>

  <!-- Information: 70 years -->
  <rect x="470" y="290" width="100" height="50" rx="4" fill="url(#barGrad)" opacity="0.7"/>
  <rect x="470" y="290" width="100" height="50" rx="4" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
  <text x="520" y="308" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="600">Information</text>
  <text x="520" y="323" text-anchor="middle" fill="#8899aa" font-size="10">1950 – 2020</text>
  <text x="520" y="370" text-anchor="middle" fill="#f5c542" font-size="14" font-weight="600">70 yrs</text>

  <!-- Collaborative Intelligence: <5 years — highlighted -->
  <rect x="600" y="325" width="120" height="15" rx="4" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="600" y="325" width="120" height="15" rx="4" fill="none" stroke="#f5c542" stroke-width="1.5"/>
  <text x="660" y="318" text-anchor="middle" fill="#f5c542" font-size="14" font-weight="700">Collaborative</text>
  <text x="660" y="300" text-anchor="middle" fill="#f5c542" font-size="14" font-weight="700">Intelligence</text>
  <text x="660" y="370" text-anchor="middle" fill="#f5c542" font-size="15" font-weight="700">&lt; 5 yrs</text>

  <!-- Acceleration arrow -->
  <path d="M 130 360 Q 400 385 660 360" fill="none" stroke="#f5c542" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <polygon points="660,356 670,360 660,364" fill="#f5c542" opacity="0.5"/>

  <!-- Annotation -->
  <text x="400" y="392" text-anchor="middle" fill="#556677" font-size="11" font-style="italic">Exponential compression — the window for gradual change is closing</text>
</svg>

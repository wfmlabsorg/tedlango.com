<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="ddbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" fill="url(#ddbg)" opacity="0.6" rx="8"/>

  <!-- Left: Deterministic (single line forecast) -->
  <text x="220" y="35" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="600" letter-spacing="0.05em">DETERMINISTIC</text>
  <rect x="60" y="50" width="320" height="200" rx="6" fill="#111827" stroke="#334455" stroke-width="1"/>
  <!-- Single line -->
  <polyline points="80,200 120,180 160,150 200,160 240,120 280,130 320,100 360,110"
    fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <text x="340" y="98" fill="#dc2626" font-size="10">forecast</text>
  <!-- Axis labels -->
  <text x="220" y="240" text-anchor="middle" fill="#556677" font-size="10">Point forecast → single number</text>

  <!-- Right: Stochastic (band forecast) -->
  <text x="580" y="35" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600" letter-spacing="0.05em">ADAPTIVE</text>
  <rect x="420" y="50" width="320" height="200" rx="6" fill="#111827" stroke="#334455" stroke-width="1"/>
  <!-- Confidence band -->
  <path d="M 440,210 L 480,185 L 520,150 L 560,165 L 600,115 L 640,125 L 680,95 L 720,108
           L 720,140 L 680,145 L 640,165 L 600,155 L 560,195 L 520,190 L 480,220 L 440,235 Z"
    fill="#22c55e" opacity="0.12"/>
  <path d="M 440,210 L 480,185 L 520,150 L 560,165 L 600,115 L 640,125 L 680,95 L 720,108"
    fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
  <path d="M 440,235 L 480,220 L 520,190 L 560,195 L 600,155 L 640,165 L 680,145 L 720,140"
    fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
  <!-- Mean line -->
  <polyline points="440,222 480,202 520,170 560,180 600,135 640,145 680,120 720,124"
    fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <text x="580" y="240" text-anchor="middle" fill="#556677" font-size="10">Confidence bands → honest ranges</text>

  <!-- Arrow between -->
  <path d="M 390 150 L 410 150" stroke="#f5c542" stroke-width="2" marker-end="none"/>
  <polygon points="408,145 418,150 408,155" fill="#f5c542"/>

  <!-- Bottom comparison -->
  <text x="220" y="285" text-anchor="middle" fill="#dc2626" font-size="12">Scales control</text>
  <text x="400" y="285" text-anchor="middle" fill="#556677" font-size="14">→</text>
  <text x="580" y="285" text-anchor="middle" fill="#22c55e" font-size="12">Scales outcomes</text>

  <text x="400" y="320" text-anchor="middle" fill="#f5c542" font-size="12" font-style="italic">Determinism scales control — adaptation scales outcomes</text>
</svg>

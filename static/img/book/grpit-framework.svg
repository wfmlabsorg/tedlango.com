<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="grbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#grbg)" opacity="0.6" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#f5c542" font-size="18" font-weight="600" font-style="italic">Foundations that Travel</text>

  <!-- GRPIT pentagon-ish layout -->
  <!-- Goals (top center) -->
  <rect x="325" y="55" width="150" height="50" rx="6" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="76" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700">Goals</text>
  <text x="400" y="93" text-anchor="middle" fill="#556677" font-size="9">Define success criteria</text>

  <!-- Roles (upper left) -->
  <rect x="100" y="120" width="150" height="50" rx="6" fill="#111827" stroke="#3b82f6" stroke-width="2"/>
  <text x="175" y="141" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="700">Roles</text>
  <text x="175" y="158" text-anchor="middle" fill="#556677" font-size="9">Who does what</text>

  <!-- Processes (upper right) -->
  <rect x="550" y="120" width="150" height="50" rx="6" fill="#111827" stroke="#8b5cf6" stroke-width="2"/>
  <text x="625" y="141" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="700">Processes</text>
  <text x="625" y="158" text-anchor="middle" fill="#556677" font-size="9">How work flows</text>

  <!-- Interpersonal (lower left) -->
  <rect x="150" y="200" width="150" height="50" rx="6" fill="#111827" stroke="#f59e42" stroke-width="2"/>
  <text x="225" y="221" text-anchor="middle" fill="#f59e42" font-size="14" font-weight="700">Interpersonal</text>
  <text x="225" y="238" text-anchor="middle" fill="#556677" font-size="9">Relationships &amp; trust</text>

  <!-- Technology (lower right) -->
  <rect x="500" y="200" width="150" height="50" rx="6" fill="#111827" stroke="#f5c542" stroke-width="2"/>
  <text x="575" y="221" text-anchor="middle" fill="#f5c542" font-size="14" font-weight="700">Technology</text>
  <text x="575" y="238" text-anchor="middle" fill="#556677" font-size="9">Tools &amp; platforms</text>

  <!-- Connecting lines -->
  <line x1="325" y1="80" x2="250" y2="120" stroke="#334455" stroke-width="1" opacity="0.4"/>
  <line x1="475" y1="80" x2="550" y2="120" stroke="#334455" stroke-width="1" opacity="0.4"/>
  <line x1="175" y1="170" x2="225" y2="200" stroke="#334455" stroke-width="1" opacity="0.4"/>
  <line x1="625" y1="170" x2="575" y2="200" stroke="#334455" stroke-width="1" opacity="0.4"/>
  <line x1="300" y1="225" x2="500" y2="225" stroke="#334455" stroke-width="1" opacity="0.4"/>

  <!-- Bottom labels -->
  <text x="400" y="285" text-anchor="middle" fill="#8899aa" font-size="11">Same backbone at every maturity level — portable across any organization</text>
  <text x="400" y="305" text-anchor="middle" fill="#556677" font-size="10">+ Maturity Models · Service-Profit Chain · STaRS Framework</text>
</svg>

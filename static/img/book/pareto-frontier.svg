<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="pfbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="surfGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f5c542" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#pfbg)" opacity="0.6" rx="8"/>

  <!-- Axes -->
  <line x1="120" y1="300" x2="680" y2="300" stroke="#334455" stroke-width="1.5"/>
  <line x1="120" y1="300" x2="120" y2="60" stroke="#334455" stroke-width="1.5"/>
  <text x="400" y="340" text-anchor="middle" fill="#556677" font-size="12">Customer Experience</text>
  <text x="65" y="180" text-anchor="middle" fill="#556677" font-size="12" transform="rotate(-90 65 180)">Cost Efficiency</text>

  <!-- Pareto curve -->
  <path d="M 160 260 C 200 200 280 140 400 110 C 520 80 600 90 650 120" fill="none" stroke="#f5c542" stroke-width="3"/>

  <!-- Surface fill below curve -->
  <path d="M 160 260 C 200 200 280 140 400 110 C 520 80 600 90 650 120 L 650 300 L 160 300 Z" fill="url(#surfGrad)"/>

  <!-- Points on frontier -->
  <circle cx="200" cy="230" r="6" fill="#3b82f6" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="200" y="218" text-anchor="middle" fill="#93c5fd" font-size="9">Cost focus</text>

  <circle cx="400" cy="110" r="8" fill="#f5c542" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="400" y="98" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Optimal balance</text>

  <circle cx="600" cy="100" r="6" fill="#22c55e" stroke="#86efac" stroke-width="1.5"/>
  <text x="600" y="88" text-anchor="middle" fill="#86efac" font-size="9">CX focus</text>

  <!-- Moving indicator -->
  <path d="M 380 115 L 420 108" stroke="#f5c542" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="418,104 426,108 418,112" fill="#f5c542" opacity="0.6"/>
  <text x="450" y="105" fill="#f5c542" font-size="8" font-style="italic">continuously navigating</text>

  <!-- Label -->
  <text x="580" y="150" fill="#f5c542" font-size="14" font-style="italic" font-weight="600">Pareto Frontier</text>

  <!-- Bottom text -->
  <text x="400" y="365" text-anchor="middle" fill="#8899aa" font-size="11">Not a fixed point — a moving surface the system navigates in real time</text>
</svg>

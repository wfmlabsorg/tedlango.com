<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="ctbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#ctbg)" opacity="0.6" rx="8"/>

  <!-- Two opposing arrows -->
  <!-- Predictability arrow (left) -->
  <rect x="80" y="110" width="280" height="100" rx="8" fill="#1a2744" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="220" y="148" text-anchor="middle" fill="#e5e5e5" font-size="15" font-weight="600">Optimizing for</text>
  <text x="220" y="178" text-anchor="middle" fill="#3b82f6" font-size="22" font-weight="700">Predictability</text>

  <!-- VS -->
  <text x="400" y="168" text-anchor="middle" fill="#556677" font-size="16" font-weight="600">vs</text>
  <!-- Tension lines -->
  <line x1="365" y1="160" x2="375" y2="160" stroke="#f5c542" stroke-width="2"/>
  <line x1="425" y1="160" x2="435" y2="160" stroke="#f5c542" stroke-width="2"/>

  <!-- Unpredictability arrow (right) -->
  <rect x="440" y="110" width="280" height="100" rx="8" fill="#2a1a1a" stroke="#f5c542" stroke-width="1.5"/>
  <text x="580" y="148" text-anchor="middle" fill="#e5e5e5" font-size="15" font-weight="600">An increasingly</text>
  <text x="580" y="178" text-anchor="middle" fill="#f5c542" font-size="22" font-weight="700" font-style="italic">Unpredictable</text>
  <text x="580" y="198" text-anchor="middle" fill="#e5e5e5" font-size="15" font-weight="600">world</text>

  <!-- Bottom annotation -->
  <text x="400" y="260" text-anchor="middle" fill="#8899aa" font-size="12">Organizations face a paradox between the need for predictability</text>
  <text x="400" y="278" text-anchor="middle" fill="#8899aa" font-size="12">and the reality of increasing uncertainty</text>

  <!-- Crack line between -->
  <path d="M 400 105 L 395 120 L 405 135 L 395 150 L 405 165 L 395 180 L 405 195 L 400 215" fill="none" stroke="#f5c542" stroke-width="1.5" opacity="0.4"/>
</svg>

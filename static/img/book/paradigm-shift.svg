<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="psbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#psbg)" opacity="0.6" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#f5c542" font-size="18" font-weight="600" font-style="italic">The Level 3 Paradigm Shift</text>

  <!-- Left: Old way -->
  <rect x="60" y="60" width="300" height="170" rx="8" fill="#111827" stroke="#dc2626" stroke-width="1.5"/>
  <text x="210" y="85" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600" letter-spacing="0.05em">PLAN RIGIDLY</text>

  <text x="210" y="115" text-anchor="middle" fill="#8899aa" font-size="11">Build the forecast</text>
  <path d="M 140 125 L 280 125" stroke="#334455" stroke-width="1"/>
  <text x="210" y="145" text-anchor="middle" fill="#8899aa" font-size="11">Create the schedule</text>
  <path d="M 140 155 L 280 155" stroke="#334455" stroke-width="1"/>
  <text x="210" y="175" text-anchor="middle" fill="#8899aa" font-size="11">Enforce adherence</text>
  <path d="M 140 185 L 280 185" stroke="#334455" stroke-width="1"/>
  <text x="210" y="210" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="600">React when it breaks</text>

  <!-- Arrow -->
  <path d="M 370 145 L 420 145" stroke="#f5c542" stroke-width="2"/>
  <polygon points="418,140 428,145 418,150" fill="#f5c542"/>

  <!-- Right: New way -->
  <rect x="440" y="60" width="300" height="170" rx="8" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="85" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600" letter-spacing="0.05em">EXPECT VARIANCE</text>

  <text x="590" y="115" text-anchor="middle" fill="#8899aa" font-size="11">Forecast in ranges</text>
  <path d="M 520 125 L 660 125" stroke="#334455" stroke-width="1"/>
  <text x="590" y="145" text-anchor="middle" fill="#8899aa" font-size="11">Build flexible capacity</text>
  <path d="M 520 155 L 660 155" stroke="#334455" stroke-width="1"/>
  <text x="590" y="175" text-anchor="middle" fill="#8899aa" font-size="11">Automate real-time response</text>
  <path d="M 520 185 L 660 185" stroke="#334455" stroke-width="1"/>
  <text x="590" y="210" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">Harvest variance for value</text>

  <!-- Bottom -->
  <text x="400" y="268" text-anchor="middle" fill="#8899aa" font-size="11">Volume dips → release agents to training. Volume surges → pull them back.</text>
  <text x="400" y="288" text-anchor="middle" fill="#f5c542" font-size="11" font-style="italic">The system responds — no supervisor intervention required</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="ecbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#ecbg)" opacity="0.6" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#f5c542" font-size="18" font-weight="600" font-style="italic">The Modern WFM Ecosystem</text>
  <text x="400" y="55" text-anchor="middle" fill="#556677" font-size="11">Connected. Intelligent. Adaptive.</text>

  <!-- Four nodes in diamond pattern -->
  <!-- WFM Core (top) -->
  <rect x="310" y="75" width="180" height="60" rx="8" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="102" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">WFM Core</text>
  <text x="400" y="120" text-anchor="middle" fill="#556677" font-size="10">Forecasting &amp; Scheduling</text>

  <!-- Capacity Planning (left) -->
  <rect x="80" y="170" width="180" height="60" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="197" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="600">Capacity Planning</text>
  <text x="170" y="215" text-anchor="middle" fill="#556677" font-size="10">Strategic Workforce Planning</text>

  <!-- Real-Time Automation (right) -->
  <rect x="540" y="170" width="180" height="60" rx="8" fill="#111827" stroke="#f59e42" stroke-width="2"/>
  <text x="630" y="197" text-anchor="middle" fill="#f59e42" font-size="13" font-weight="600">Real-Time Automation</text>
  <text x="630" y="215" text-anchor="middle" fill="#556677" font-size="10">Intraday Optimization</text>

  <!-- Analytics (bottom) -->
  <rect x="310" y="265" width="180" height="60" rx="8" fill="#111827" stroke="#8b5cf6" stroke-width="2"/>
  <text x="400" y="292" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="600">Analytics Platform</text>
  <text x="400" y="310" text-anchor="middle" fill="#556677" font-size="10">Intelligence &amp; Insights</text>

  <!-- Bidirectional arrows -->
  <!-- Top to Left -->
  <path d="M 310 120 L 260 170" stroke="#334455" stroke-width="1.5" marker-end="none"/>
  <path d="M 260 175 L 315 125" stroke="#334455" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Top to Right -->
  <path d="M 490 120 L 540 170" stroke="#334455" stroke-width="1.5"/>
  <path d="M 535 175 L 485 125" stroke="#334455" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Left to Bottom -->
  <path d="M 260 230 L 310 265" stroke="#334455" stroke-width="1.5"/>
  <path d="M 315 260 L 265 225" stroke="#334455" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Right to Bottom -->
  <path d="M 540 230 L 490 265" stroke="#334455" stroke-width="1.5"/>
  <path d="M 485 260 L 535 225" stroke="#334455" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- API labels on connections -->
  <text x="265" y="145" text-anchor="middle" fill="#334455" font-size="8">Planning API</text>
  <text x="535" y="145" text-anchor="middle" fill="#334455" font-size="8">Schedule API</text>
  <text x="265" y="255" text-anchor="middle" fill="#334455" font-size="8">Insights API</text>
  <text x="535" y="255" text-anchor="middle" fill="#334455" font-size="8">Metrics API</text>

  <!-- Bottom labels -->
  <text x="250" y="358" text-anchor="middle" fill="#556677" font-size="9">Seamless bidirectional data flow</text>
  <text x="400" y="358" text-anchor="middle" fill="#556677" font-size="9">·</text>
  <text x="540" y="358" text-anchor="middle" fill="#556677" font-size="9">Unified intelligence</text>
</svg>

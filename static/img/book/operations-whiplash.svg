<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg2)" rx="8"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#f5c542" font-size="22" font-weight="600" font-style="italic">Forecast Miss → Operations Whiplash</text>

  <!-- === THE SEE-SAW === -->

  <!-- Fulcrum triangle -->
  <polygon points="400,290 375,330 425,330" fill="#1e3a5f" stroke="#334455" stroke-width="1.5"/>

  <!-- Ground -->
  <line x1="200" y1="330" x2="600" y2="330" stroke="#334455" stroke-width="2"/>

  <!-- Beam - tilted: left side UP (light), right side DOWN (heavy) -->
  <line x1="150" y1="230" x2="650" y2="310" stroke="#6b7280" stroke-width="6" stroke-linecap="round"/>

  <!-- LEFT SIDE: Volume +10% (light, floating up) -->
  <!-- Small box sitting on the high end of the beam -->
  <rect x="150" y="178" width="140" height="52" rx="8" fill="#1a2744" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="200" text-anchor="middle" fill="#e5e5e5" font-size="14" font-weight="500">Volume</text>
  <text x="220" y="220" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="700">+10%</text>

  <!-- "small delta" annotation -->
  <text x="220" y="165" text-anchor="middle" fill="#93c5fd" font-size="11" font-style="italic">small delta</text>
  <line x1="220" y1="168" x2="220" y2="176" stroke="#93c5fd" stroke-width="1" opacity="0.5"/>

  <!-- RIGHT SIDE: Cascading consequences (heavy, crashing down) -->
  <!-- Stacked blocks getting progressively worse, sitting on the low end -->
  <rect x="490" y="230" width="160" height="34" rx="6" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5" opacity="0.7"/>
  <text x="570" y="252" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="600">Overtime ↑</text>

  <rect x="500" y="266" width="155" height="34" rx="6" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5" opacity="0.85"/>
  <text x="578" y="288" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="600">Handle Time ↑</text>

  <rect x="485" y="195" width="165" height="34" rx="6" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5" opacity="0.55"/>
  <text x="568" y="217" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="600">Abandons ↑</text>

  <!-- Weight indicator: the right side is disproportionately heavy -->
  <text x="570" y="180" text-anchor="middle" fill="#dc2626" font-size="11" font-style="italic">disproportionate impact</text>
  <path d="M 530 185 L 530 193" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <path d="M 610 185 L 610 193" stroke="#dc2626" stroke-width="1" opacity="0.5"/>

  <!-- Imbalance arrow showing the tilt -->
  <path d="M 320 260 C 340 280 360 285 380 288" stroke="#f5c542" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.6"/>
  <text x="350" y="275" fill="#f5c542" font-size="9" transform="rotate(15 350 275)">tilt</text>

  <!-- === BOTTOM: Two approaches === -->
  <rect x="100" y="355" width="270" height="48" rx="6" fill="#1a1a2e" stroke="#dc2626" stroke-width="1.5"/>
  <text x="120" y="376" fill="#dc2626" font-size="13" font-weight="600">DETERMINISTIC</text>
  <text x="120" y="394" fill="#8899aa" font-size="11">Plans snap — scramble, overtime, quality drops</text>

  <rect x="430" y="355" width="270" height="48" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="376" fill="#22c55e" font-size="13" font-weight="600">ADAPTIVE</text>
  <text x="450" y="394" fill="#8899aa" font-size="11">Systems bend — pre-positioned flex, real-time response</text>

  <!-- Arrow between -->
  <path d="M 375 379 L 425 379" stroke="#f5c542" stroke-width="2"/>
  <polygon points="423,374 433,379 423,384" fill="#f5c542"/>

  <!-- Bottom tagline -->
  <text x="400" y="415" text-anchor="middle" fill="#556677" font-size="11" font-style="italic">Small misses shouldn't cause big swings — design for give, not break</text>
</svg>

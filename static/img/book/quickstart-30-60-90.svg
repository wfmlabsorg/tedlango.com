<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="qsbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="280" fill="url(#qsbg)" opacity="0.6" rx="8"/>

  <!-- Timeline line -->
  <line x1="100" y1="130" x2="700" y2="130" stroke="#334455" stroke-width="2"/>

  <!-- Day 0 marker -->
  <circle cx="100" cy="130" r="5" fill="#556677"/>
  <text x="100" y="155" text-anchor="middle" fill="#556677" font-size="10">Today</text>

  <!-- 30 days -->
  <circle cx="300" cy="130" r="12" fill="#1a2744" stroke="#3b82f6" stroke-width="2"/>
  <text x="300" y="135" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="700">30</text>
  <rect x="220" y="60" width="160" height="50" rx="6" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="300" y="80" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">ASSESS</text>
  <text x="300" y="98" text-anchor="middle" fill="#556677" font-size="9">Find your maturity level</text>
  <line x1="300" y1="110" x2="300" y2="118" stroke="#3b82f6" stroke-width="1"/>

  <!-- 60 days -->
  <circle cx="500" cy="130" r="12" fill="#1a2744" stroke="#f59e42" stroke-width="2"/>
  <text x="500" y="135" text-anchor="middle" fill="#f59e42" font-size="11" font-weight="700">60</text>
  <rect x="420" y="60" width="160" height="50" rx="6" fill="#111827" stroke="#f59e42" stroke-width="1.5"/>
  <text x="500" y="80" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">PILOT</text>
  <text x="500" y="98" text-anchor="middle" fill="#556677" font-size="9">Run at next level up</text>
  <line x1="500" y1="110" x2="500" y2="118" stroke="#f59e42" stroke-width="1"/>

  <!-- 90 days -->
  <circle cx="700" cy="130" r="12" fill="#1a2744" stroke="#22c55e" stroke-width="2"/>
  <text x="700" y="135" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">90</text>
  <rect x="620" y="60" width="160" height="50" rx="6" fill="#111827" stroke="#22c55e" stroke-width="1.5"/>
  <text x="700" y="80" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">SCALE</text>
  <text x="700" y="98" text-anchor="middle" fill="#556677" font-size="9">Expand what works</text>
  <line x1="700" y1="110" x2="700" y2="118" stroke="#22c55e" stroke-width="1"/>

  <!-- Progress arrows -->
  <path d="M 312 130 L 488 130" stroke="#334455" stroke-width="1"/>
  <path d="M 512 130 L 688 130" stroke="#334455" stroke-width="1"/>

  <!-- Bottom tools -->
  <rect x="180" y="180" width="140" height="36" rx="4" fill="#111827" stroke="#334455" stroke-width="1"/>
  <text x="250" y="202" text-anchor="middle" fill="#f5c542" font-size="10" font-weight="600">The Book</text>
  <text x="250" y="214" text-anchor="middle" fill="#556677" font-size="8">= playbook</text>

  <rect x="340" y="180" width="140" height="36" rx="4" fill="#111827" stroke="#334455" stroke-width="1"/>
  <text x="410" y="202" text-anchor="middle" fill="#f5c542" font-size="10" font-weight="600">WFM Labs</text>
  <text x="410" y="214" text-anchor="middle" fill="#556677" font-size="8">= community</text>

  <rect x="500" y="180" width="140" height="36" rx="4" fill="#111827" stroke="#334455" stroke-width="1"/>
  <text x="570" y="202" text-anchor="middle" fill="#f5c542" font-size="10" font-weight="600">Maturity Model</text>
  <text x="570" y="214" text-anchor="middle" fill="#556677" font-size="8">= the map</text>

  <!-- Bottom -->
  <text x="400" y="255" text-anchor="middle" fill="#f5c542" font-size="12" font-style="italic">Choose your pilot now — what would you run Monday?</text>
</svg>

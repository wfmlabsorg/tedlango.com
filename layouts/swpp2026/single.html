<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} — Ted Lango</title>
  <meta name="description" content="{{ .Description }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ .Description }}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ .Site.BaseURL }}img/swpp2026/slide-01.jpg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
      user-select: none;
    }

    .presentation {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: opacity 0.3s ease;
    }

    .slide-img.loading { opacity: 0.3; }

    /* Navigation areas */
    .nav-prev, .nav-next {
      position: absolute;
      top: 0;
      width: 15%;
      height: 100%;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .nav-prev:hover, .nav-next:hover { opacity: 1; }
    .nav-prev { left: 0; justify-content: flex-start; padding-left: 20px; }
    .nav-next { right: 0; justify-content: flex-end; padding-right: 20px; }

    .nav-arrow {
      font-size: 48px;
      color: rgba(255,255,255,0.6);
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    /* Progress bar */
    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #F59E0B;
      transition: width 0.3s ease;
      z-index: 20;
    }

    /* Slide counter */
    .slide-counter {
      position: fixed;
      bottom: 12px;
      right: 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      z-index: 20;
    }

    /* Thumbnail strip */
    .thumb-strip {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(0,0,0,0.95);
      display: flex;
      align-items: center;
      overflow-x: auto;
      gap: 4px;
      padding: 8px 12px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 30;
    }
    .thumb-strip.visible { transform: translateY(0); }

    .thumb {
      flex-shrink: 0;
      width: 120px;
      height: 68px;
      object-fit: cover;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .thumb:hover { opacity: 0.8; }
    .thumb.active { border-color: #F59E0B; opacity: 1; }

    /* Fullscreen button */
    .fullscreen-btn {
      position: fixed;
      top: 16px;
      right: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .presentation:hover .fullscreen-btn { opacity: 1; }
    .fullscreen-btn:hover { background: rgba(255,255,255,0.2); }

    /* Help overlay */
    .help-text {
      position: fixed;
      top: 16px;
      left: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      z-index: 20;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .presentation:hover .help-text { opacity: 1; }
  </style>
</head>
<body>
  <div class="presentation" id="presentation">
    <div class="slide-container">
      <img class="slide-img" id="slideImg" src="/img/swpp2026/slide-01.jpg" alt="Slide 1">
    </div>

    <div class="nav-prev" id="navPrev" title="Previous slide">
      <span class="nav-arrow">‹</span>
    </div>
    <div class="nav-next" id="navNext" title="Next slide">
      <span class="nav-arrow">›</span>
    </div>

    <div class="progress-bar" id="progressBar"></div>
    <div class="slide-counter" id="slideCounter">1 / {{ .Params.slide_count }}</div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>
    <div class="help-text">← → arrows | space | T for thumbnails | F for fullscreen</div>

    <div class="thumb-strip" id="thumbStrip"></div>
  </div>

  <script>
    const TOTAL_SLIDES = {{ .Params.slide_count }};
    const BASE_PATH = '/img/swpp2026/slide-';
    let current = 1;
    let thumbsVisible = false;

    const img = document.getElementById('slideImg');
    const counter = document.getElementById('slideCounter');
    const progress = document.getElementById('progressBar');
    const thumbStrip = document.getElementById('thumbStrip');

    // Preload adjacent slides
    function preload(n) {
      if (n >= 1 && n <= TOTAL_SLIDES) {
        const i = new Image();
        i.src = `${BASE_PATH}${String(n).padStart(2,'0')}.jpg`;
      }
    }

    function goTo(n) {
      if (n < 1 || n > TOTAL_SLIDES) return;
      current = n;
      img.classList.add('loading');
      img.onload = () => img.classList.remove('loading');
      img.src = `${BASE_PATH}${String(n).padStart(2,'0')}.jpg`;
      img.alt = `Slide ${n}`;
      counter.textContent = `${n} / ${TOTAL_SLIDES}`;
      progress.style.width = `${(n / TOTAL_SLIDES) * 100}%`;

      // Update active thumbnail
      document.querySelectorAll('.thumb').forEach((t, i) => {
        t.classList.toggle('active', i + 1 === n);
      });
      // Scroll active thumb into view
      const activeThumb = thumbStrip.querySelector('.thumb.active');
      if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

      preload(n + 1);
      preload(n - 1);
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    // Build thumbnail strip
    for (let i = 1; i <= TOTAL_SLIDES; i++) {
      const t = document.createElement('img');
      t.className = 'thumb' + (i === 1 ? ' active' : '');
      t.src = `${BASE_PATH}${String(i).padStart(2,'0')}.jpg`;
      t.alt = `Slide ${i}`;
      t.loading = 'lazy';
      t.onclick = () => goTo(i);
      thumbStrip.appendChild(t);
    }

    // Click navigation
    document.getElementById('navPrev').onclick = prev;
    document.getElementById('navNext').onclick = next;

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowRight': case ' ': e.preventDefault(); next(); break;
        case 'ArrowLeft': e.preventDefault(); prev(); break;
        case 'Home': e.preventDefault(); goTo(1); break;
        case 'End': e.preventDefault(); goTo(TOTAL_SLIDES); break;
        case 't': case 'T':
          thumbsVisible = !thumbsVisible;
          thumbStrip.classList.toggle('visible', thumbsVisible);
          break;
        case 'f': case 'F':
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
          } else {
            document.exitFullscreen();
          }
          break;
        case 'Escape':
          if (thumbsVisible) { thumbsVisible = false; thumbStrip.classList.remove('visible'); }
          break;
      }
    });

    // Fullscreen button
    document.getElementById('fullscreenBtn').onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    };

    // Touch swipe support
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) { diff > 0 ? next() : prev(); }
    });

    // Preload first few slides
    preload(2);
    preload(3);
    goTo(1);
  </script>
</body>
</html>
